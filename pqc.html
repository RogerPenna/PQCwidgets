<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal PQC - Ecossistema</title>
    <link rel="stylesheet" href="pqc-style.css">
    <!-- Grist Widget API -->
    <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
</head>
<body>
    <div id="pqc-app">
        <header id="pqc-topbar">
            <div class="topbar-brand">
                <img src="https://docs.getgrist.com/icons/grist-logo.svg" alt="PQC Logo" class="logo">
                <span class="brand-name">Ecossistema PQC</span>
            </div>
            
            <nav class="topbar-nav">
                <ul class="nav-links">
                    <li class="nav-item active" data-page="home">🏠 Home</li>
                    <li class="nav-item" data-page="diamante">💎 Checklist Diamante</li>
                    <li class="nav-item" data-page="autoavaliacao">📝 Autoavaliação</li>
                </ul>
            </nav>

            <div class="topbar-info">
                <select id="company-selector" class="company-select">
                    <option value="">Selecionar Empresa...</option>
                </select>
                <span id="company-name" class="company-badge" style="display:none;">Carregando...</span>
            </div>
        </header>

        <main id="pqc-content">
            <!-- As páginas serão injetadas aqui -->
            <div id="loader">Iniciando Portal PQC...</div>
        </main>
    </div>

    <!-- Console de Debug (Oculto por padrão) -->
    <div id="pqc-debug" style="display:none;">
        <h3>Debug Console</h3>
        <div id="debug-log"></div>
    </div>

    <script type="module" src="pqc-main.js"></script>
</body>
</html>
