<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal PQC v1.0.2</title>
    <link rel="stylesheet" href="pqc-style.css?v=1.0.2">
    <link rel="stylesheet" href="pqc-capacitacao.css?v=1.0.2">
    <link rel="stylesheet" href="pqc-autoavaliacao.css?v=1.0.2">
    <link rel="stylesheet" href="pqc-melhorias.css?v=1.0.2">
    <link rel="stylesheet" href="pqc-detalhes.css?v=1.0.2">
    <!-- Grist Widget API -->
    <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
</head>
<body>
    <div id="pqc-app" class="v102">
        <header id="pqc-topbar">
            <div class="topbar-left">
                <select id="company-selector" class="company-select">
                    <option value="">Carregando empresas...</option>
                </select>
            </div>
            
            <nav class="topbar-nav">
                <div class="menu-container">
                    <label for="menu-selector" class="menu-label">Menu:</label>
                    <select id="menu-selector" class="menu-select">
                        <option value="home">🏠 1 - Detalhe Empresa</option>
                        <option value="autoavaliacao">📝 2 - Práticas</option>
                        <option value="bonus">🎁 3 - Bônus Pontualidade IC</option>
                        <option value="resultados">📊 4 - Resultados</option>
                        <option value="melhorias">🛠️ 5 - Plano de Melhorias</option>
                        <option value="capacitacao">⏲️ 6 - Horas de Capacitação</option>
                    </select>
                </div>
            </nav>

            <div class="topbar-right">
                <span class="version-badge">v1.0.2</span>
                <span id="company-name" class="company-badge" style="display:none;"></span>
            </div>
        </header>

        <main id="pqc-content">
            <div id="loader">Carregando Ecossistema...</div>
        </main>
    </div>

    <script type="module" src="pqc-main.js?v=1.0.2"></script>
</body>
</html>
